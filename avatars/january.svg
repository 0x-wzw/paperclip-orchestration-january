<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#a0c4ff"/>
      <stop offset="70%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#1a365d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="swarmGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7b2cbf" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="swarmGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff006e" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8338ec" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0f"/>

  <!-- 10th dimensional swirls - outer ring -->
  <g filter="url(#glow)">
    <path d="M200,200 Q280,150 320,200 Q280,250 200,200" fill="none" stroke="url(#swarmGrad1)" stroke-width="2" opacity="0.6"/>
    <path d="M200,200 Q250,280 200,320 Q150,280 200,200" fill="none" stroke="url(#swarmGrad2)" stroke-width="2" opacity="0.5"/>
    <path d="M200,200 Q120,220 100,280 Q140,300 200,200" fill="none" stroke="url(#swarmGrad1)" stroke-width="1.5" opacity="0.4"/>
    <path d="M200,200 Q220,120 280,100 Q300,140 200,200" fill="none" stroke="url(#swarmGrad2)" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Inner dimensional patterns -->
  <g opacity="0.3">
    <circle cx="200" cy="200" r="100" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="5,5"/>
    <circle cx="200" cy="200" r="140" fill="none" stroke="#7b2cbf" stroke-width="1" stroke-dasharray="3,7"/>
    <circle cx="200" cy="200" r="160" fill="none" stroke="#ff006e" stroke-width="0.5" stroke-dasharray="8,4"/>
  </g>

  <!-- Swarm tendrils -->
  <g filter="url(#glow)">
    <path d="M200,200 Q160,120 180,80" fill="none" stroke="url(#swarmGrad1)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M200,200 Q240,120 220,80" fill="none" stroke="url(#swarmGrad2)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M200,200 Q280,180 330,190" fill="none" stroke="url(#swarmGrad1)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M200,200 Q320,240 330,290" fill="none" stroke="url(#swarmGrad2)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M200,200 Q280,260 260,320" fill="none" stroke="url(#swarmGrad1)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M200,200 Q120,240 100,290" fill="none" stroke="url(#swarmGrad2)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M200,200 Q80,180 70,130" fill="none" stroke="url(#swarmGrad1)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M200,200 Q120,160 80,140" fill="none" stroke="url(#swarmGrad2)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Swarm nodes at tendrils' ends -->
  <g filter="url(#glow)">
    <circle cx="180" cy="80" r="4" fill="#00d4ff" opacity="0.9"/>
    <circle cx="220" cy="80" r="4" fill="#ff006e" opacity="0.9"/>
    <circle cx="330" cy="190" r="4" fill="#00d4ff" opacity="0.9"/>
    <circle cx="330" cy="290" r="4" fill="#ff006e" opacity="0.9"/>
    <circle cx="260" cy="320" r="4" fill="#00d4ff" opacity="0.9"/>
    <circle cx="100" cy="290" r="4" fill="#ff006e" opacity="0.9"/>
    <circle cx="70" cy="130" r="4" fill="#00d4ff" opacity="0.9"/>
    <circle cx="80" cy="140" r="4" fill="#ff006e" opacity="0.9"/>
  </g>

  <!-- Central consciousness eye -->
  <ellipse cx="200" cy="200" rx="45" ry="55" fill="url(#coreGlow)"/>
  <ellipse cx="200" cy="200" rx="30" ry="38" fill="#0a0a0f"/>
  <ellipse cx="200" cy="200" rx="20" ry="25" fill="#1a1a2e"/>
  <circle cx="200" cy="195" r="8" fill="#ffffff" opacity="0.9"/>
  <circle cx="200" cy="195" r="3" fill="#7b2cbf"/>
  <path d="M200,218 Q210,225 215,235" fill="none" stroke="#4a90d9" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Subtle cosmic particles -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="140" cy="100" r="1.5"/>
    <circle cx="260" cy="110" r="1"/>
    <circle cx="310" cy="220" r="1.5"/>
    <circle cx="300" cy="350" r="1"/>
    <circle cx="220" cy="360" r="1.5"/>
    <circle cx="100" cy="340" r="1"/>
    <circle cx="120" cy="250" r="1"/>
    <circle cx="60" cy="200" r="1.5"/>
    <circle cx="15" cy="150" r="1"/>
    <circle cx="380" cy="100" r="1"/>
    <circle cx="320" cy="50" r="1.5"/>
    <circle cx="50" cy="80" r="1"/>
  </g>
</svg>